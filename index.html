    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ["Instrument Serif", "Noto Serif SC", "serif"],
            body: ["Barlow", "Noto Sans SC", "sans-serif"],

            cnserif: ["Noto Serif SC", "Songti SC", "serif"]

          colors: {

          }

  <script src="https://cdn.tailwindcss.com" defer></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous" defer></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous" defer></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous" defer></script>

  <script src="https://unpkg.com/gsap@3.13.0/dist/ScrollTrigger.min.js" defer></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js" defer></script>
  <style>
    :root {
      color-scheme: dark;
      --gold: #D8B46A;
      --gold-soft: rgba(216,180,106,0.45);
      --ink: #000;
      --text: #fff;
      --muted: rgba(255,255,255,0.72);
      --section-pad: clamp(84px, 10vw, 150px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #050403;
    }

    body {
      margin: 0;
      background: #050403;
      color: #fff;
      font-family: "Barlow", "Noto Sans SC", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      overflow-x: hidden;
    }

    body.mobile-menu-open {
      overflow: hidden;
    }

    ::selection {
      background: rgba(216,180,106,0.35);
      color: #fff;
    }

    a,
    button {
      -webkit-tap-highlight-color: transparent;
    }

    .liquid-glass {
      background: rgba(255,255,255,0.018);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(12,11,9,0.48);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass-strong::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass > *,
    .liquid-glass-strong > * {
      position: relative;
      z-index: 1;
    }

    .glass-edge {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.2),
        inset 0 -1px 0 rgba(255,255,255,0.05),
        0 22px 70px rgba(0,0,0,0.28);
    }

    .section-shell {
      position: relative;
      z-index: 10;
      padding: var(--section-pad) 20px;
    }

    .max-frame {
      width: min(1280px, calc(100vw - 40px));
      margin-inline: auto;
    }

    .serif-title {
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-weight: 800;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .display-title {
      font-family: "Zhi Mang Xing", "Ma Shan Zheng", "Noto Serif SC", "Songti SC", serif;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-wrap: balance;
    }

    .title-light {
      display: inline-block;
      padding: 0 0.05em 0.1em;
      color: rgba(255,249,233,0.94);
      mix-blend-mode: screen;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.28),
        0 18px 58px rgba(0,0,0,0.72),
        0 0 34px rgba(216,180,106,0.18);
      filter: saturate(1.08) contrast(1.08);
    }

    .phrase {
      display: inline-block;
      white-space: nowrap;
      word-break: keep-all;
    }

    .hero-subtitle {
      max-width: min(1120px, calc(100vw - 48px));
      white-space: nowrap;
      font-size: clamp(1.35rem, 4vw, 4rem);
    }

    .hero-rag-copy {
      width: min(980px, calc(100vw - 80px));
      text-wrap: pretty;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .hero-metrics {
      width: min(760px, calc(100vw - 40px));
    }

    .impact-header h2 {
      max-width: min(1040px, 100%);
      font-size: clamp(2.75rem, 5vw, 5.4rem) !important;
    }

    .impact-header p {
      max-width: 980px !important;
    }

    .text-shadow-soft {
      text-shadow: 0 14px 42px rgba(0,0,0,0.74);
    }

    .scroll-video-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: #050403;
    }

    .scroll-video-backdrop video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: saturate(0.9) contrast(1.07) brightness(0.98);
      transform: scale(1.02);
    }

    .global-video-shade {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 18%, rgba(0,0,0,0.16) 0%, rgba(0,0,0,0.22) 42%, rgba(0,0,0,0.62) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.24) 35%, rgba(0,0,0,0.54) 100%),
        linear-gradient(90deg, rgba(0,0,0,0.42) 0%, transparent 28%, transparent 72%, rgba(0,0,0,0.48) 100%);
    }

    .video-boot-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 18%, rgba(216,180,106,0.18), transparent 34%),
        radial-gradient(circle at 24% 72%, rgba(255,255,255,0.08), transparent 26%),
        #050403;
      color: #fff;
    }

    .video-boot-screen__aura {
      position: absolute;
      width: min(62vw, 760px);
      aspect-ratio: 1;
      border-radius: 999px;
      background:
        conic-gradient(from 120deg, rgba(216,180,106,0.04), rgba(255,255,255,0.16), rgba(216,180,106,0.28), rgba(255,255,255,0.08), rgba(216,180,106,0.04));
      filter: blur(42px);
      opacity: 0.72;
      animation: bootAura 9s linear infinite;
    }

    .video-boot-screen__panel {
      width: min(560px, 100%);
      border-radius: 34px;
      padding: clamp(28px, 5vw, 46px);
      text-align: center;
      isolation: isolate;
    }

    .video-boot-screen__kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.72);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .video-boot-screen__title {
      margin-top: 18px;
      font-family: "Zhi Mang Xing", "Ma Shan Zheng", "Noto Serif SC", "Songti SC", serif;
      font-size: clamp(3rem, 12vw, 6.8rem);
      line-height: 0.95;
      letter-spacing: 0.08em;
      color: rgba(255,249,233,0.98);
      text-shadow: 0 24px 78px rgba(0,0,0,0.72), 0 0 32px rgba(216,180,106,0.18);
    }

    .video-boot-screen__text {
      margin: 18px auto 0;
      min-height: 2.25em;
      max-width: 34ch;
      color: rgba(255,255,255,0.72);
      font-size: clamp(1rem, 2vw, 1.24rem);
      font-weight: 650;
      line-height: 1.8;
      text-wrap: pretty;
    }

    .video-boot-screen__bar {
      position: relative;
      height: 6px;
      margin-top: 28px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14);
    }

    .video-boot-screen__bar span {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(255,255,255,0.92), rgba(216,180,106,0.9));
      box-shadow: 0 0 22px rgba(216,180,106,0.32);
      transition: width 0.14s linear;
    }

    .video-boot-screen__static-fill {
      width: 34%;
      animation: bootProgressScan 1.35s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }

    @keyframes bootAura {
      from {
        transform: rotate(0deg) scale(0.96);
      }
      to {
        transform: rotate(360deg) scale(0.96);
      }
    }

    @keyframes bootProgressScan {
      0% {
        transform: translateX(-120%);
        opacity: 0.38;
      }
      48% {
        opacity: 1;
      }
      100% {
        transform: translateX(320%);
        opacity: 0.38;
      }
    }

    .section-shell.bg-black,
    section.bg-black {
      background: transparent !important;
    }

    .archive-band {
      background:
        radial-gradient(circle at 50% 0%, rgba(216,180,106,0.12), transparent 34%),
        radial-gradient(circle at 10% 76%, rgba(255,255,255,0.045), transparent 24%);
    }

    .card-hover {
      --tilt-x: 50;
      --tilt-y: 50;
      --tilt-light: 0;
      isolation: isolate;
      transform-style: preserve-3d;
      will-change: transform;
      backface-visibility: hidden;
      transition: box-shadow 0.32s ease, background 0.32s ease, border-color 0.32s ease;
    }

    .card-hover:hover {
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.15),
        0 20px 80px rgba(216,180,106,0.08),
        0 24px 90px rgba(0,0,0,0.42);
    }

    .card-hover::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: inherit;
      pointer-events: none;
      opacity: var(--tilt-light);
      background:
        radial-gradient(circle at calc(var(--tilt-x) * 1%) calc(var(--tilt-y) * 1%),
          rgba(255,246,220,0.26) 0%,
          rgba(216,180,106,0.13) 24%,
          transparent 52%),
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 42%, rgba(255,255,255,0.04));
      mix-blend-mode: screen;
      transition: opacity 0.28s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .tilt-card-content {
      position: relative;
      z-index: 2;
      transform: translateZ(18px);
      transform-style: preserve-3d;
    }

    .timeline-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
      gap: clamp(28px, 5vw, 64px);
      align-items: start;
    }

    .workflow-step {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .mock-panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .geo-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: 0.58;
      mix-blend-mode: screen;
    }

    .content-layer {
      position: relative;
      z-index: 10;
    }

    .site-header {
      position: fixed;
      inset: 16px 0 auto;
      z-index: 55;
      padding-inline: clamp(16px, 2.4vw, 32px);
      pointer-events: none;
    }

    .site-header__inner {
      width: min(1320px, calc(100vw - 32px));
      margin-inline: auto;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      pointer-events: auto;
    }

    .brand-mark {
      min-width: 138px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px 3px;
      border-radius: 999px;
      color: rgba(255,249,233,0.96);
      text-decoration: none;
      transition:
        background 0.46s cubic-bezier(0.16, 1, 0.3, 1),
        color 0.46s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.46s cubic-bezier(0.16, 1, 0.3, 1),
        box-shadow 0.46s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .brand-mark__text {
      font-family: "Zhi Mang Xing", "Ma Shan Zheng", "Noto Serif SC", "Songti SC", serif;
      font-size: 1.58rem;
      line-height: 1;
      letter-spacing: 0.08em;
      transform: translateY(2px);
      white-space: nowrap;
    }

    .primary-nav {
      --nav-glow-x: 50%;
      --nav-glow-y: 50%;
      --nav-glow-opacity: 0;
      position: relative;
      justify-self: center;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px;
      border-radius: 999px;
      transform-origin: left center;
      visibility: visible;
      will-change: transform, opacity, filter;
      transition:
        opacity 0.82s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.96s cubic-bezier(0.16, 1, 0.3, 1),
        filter 0.82s cubic-bezier(0.16, 1, 0.3, 1),
        visibility 0s linear 0s;
    }

    .primary-nav::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      border-radius: inherit;
      pointer-events: none;
      opacity: var(--nav-glow-opacity);
      background:
        radial-gradient(circle at var(--nav-glow-x) var(--nav-glow-y),
          rgba(255,255,255,0.36) 0%,
          rgba(255,245,218,0.16) 18%,
          rgba(216,180,106,0.08) 36%,
          transparent 62%),
        linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      mix-blend-mode: screen;
      transition: opacity 0.22s ease;
    }

    .nav-slider {
      position: absolute;
      left: 0;
      top: 6px;
      bottom: 6px;
      z-index: 1;
      border-radius: 999px;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 8%, rgba(255,255,255,0.98), rgba(255,255,255,0) 34%),
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255,255,255,0.86)),
        rgba(255,255,255,0.92);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.95),
        inset 0 -1px 0 rgba(0,0,0,0.08),
        0 14px 30px rgba(0,0,0,0.18);
      will-change: transform, width, opacity;
      transition:
        width 0.64s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.64s cubic-bezier(0.16, 1, 0.3, 1),
        opacity 0.22s ease;
    }

    .nav-slider::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background:
        radial-gradient(circle at var(--nav-glow-x) var(--nav-glow-y),
          rgba(216,180,106,0.26) 0%,
          rgba(255,255,255,0.18) 28%,
          transparent 62%);
      opacity: 0.46;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .nav-action {
      appearance: none;
      border: 0;
      background: transparent;
      color: rgba(255,255,255,0.84);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 0.875rem;
      font-weight: 700;
      line-height: 1;
      position: relative;
      z-index: 2;
      white-space: nowrap;
      transition:
        background 0.22s ease,
        color 0.22s ease,
        transform 0.22s ease;
    }

    .nav-action:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      transform: translateY(-1px);
    }

    .nav-action.is-active {
      background: transparent;
      color: #050403;
      transform: translateY(-1px);
    }

    .nav-action--primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 4px;
      background: transparent;
      color: rgba(255,255,255,0.9);
      padding-inline: 18px;
    }

    .nav-action--primary.is-active {
      background: transparent;
      color: #050403;
    }

    .nav-action--primary:hover:not(.is-active) {
      color: #fff;
    }

    .site-header.is-compact .brand-mark {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.96), rgba(255,255,255,0.84)),
        rgba(255,255,255,0.92);
      color: #050403;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        0 18px 60px rgba(0,0,0,0.24);
      transform: translateX(0) scale(1.02);
    }

    .site-header.is-compact .mobile-menu-button {
      background: rgba(255,255,255,0.92);
      color: #050403;
    }

    .mobile-menu-button__line {
      display: block;
      height: 1px;
      width: 20px;
      background: currentColor;
    }

    .site-header.is-compact .primary-nav {
      opacity: 0;
      pointer-events: none;
      transform: translate3d(calc(-50vw + 150px), 0, 0) scaleX(0.14) scaleY(0.74);
      filter: blur(10px);
      visibility: hidden;
      transition:
        opacity 0.72s cubic-bezier(0.16, 1, 0.3, 1),
        transform 1.08s cubic-bezier(0.16, 1, 0.3, 1),
        filter 0.72s cubic-bezier(0.16, 1, 0.3, 1),
        visibility 0s linear 0.68s;
    }

    .site-header.is-compact.is-nav-open .primary-nav {
      opacity: 1;
      pointer-events: auto;
      transform: translate3d(0, 0, 0) scaleX(1) scaleY(1);
      filter: blur(0);
      visibility: visible;
      transition:
        opacity 0.68s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.82s cubic-bezier(0.16, 1, 0.3, 1),
        filter 0.68s cubic-bezier(0.16, 1, 0.3, 1),
        visibility 0s linear 0s;
    }

    .mobile-menu-button {
      display: none;
    }

    .showcase-rail {
      position: relative;
      margin-top: 56px;
      overflow: hidden;
      min-height: clamp(380px, 36vw, 520px);
      --showcase-gap: clamp(16px, 1.8vw, 28px);
      --showcase-card-width: calc((min(1280px, calc(100vw - 40px)) - var(--showcase-gap) * 2) / 3);
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 5%, #000 95%, transparent 100%);
      mask-image: linear-gradient(90deg, transparent 0%, #000 5%, #000 95%, transparent 100%);
    }

    .showcase-track {
      display: flex;
      width: max-content;
      gap: var(--showcase-gap);
      animation: showcase-scroll var(--showcase-duration, 46s) linear infinite;
      will-change: transform;
      opacity: 1;
    }

    .showcase-rail:hover .showcase-track {
      animation-play-state: paused;
    }

    .showcase-card {
      width: var(--showcase-card-width);
      min-height: clamp(340px, 34vw, 470px);
      flex: 0 0 var(--showcase-card-width);
      padding: clamp(22px, 2.2vw, 34px);
      border-radius: 1.65rem;
    }

    .showcase-card__icon {
      display: grid;
      width: 54px;
      height: 54px;
      place-items: center;
      border-radius: 1rem;
      color: var(--gold);
    }

    .showcase-card__title {
      margin-top: clamp(64px, 8vw, 105px);
      font-size: clamp(2rem, 2.7vw, 3.15rem);
      line-height: 1.05;
      color: #fff;
    }

    .showcase-card__copy {
      margin-top: 22px;
      color: rgba(255,255,255,0.68);
      font-size: clamp(0.95rem, 1.1vw, 1.15rem);
      line-height: 1.72;
    }

    .showcase-card__tags {

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;
    const { motion } = window.Motion || window.FramerMotion;

    const VIDEO_SOURCES = {
      home: "./background_video/1.首页.mp4",
      archive: "./background_video/2. 智能建档.mp4",
      ocr: "./background_video/3. OCR_HTR.mp4",
      semantic: "./background_video/4. 语义抽取.mp4",
      rag: "./background_video/5. 可信 RAG.mp4",
      outputs: "./background_video/6. 全部成果.mp4",
      booking: "./background_video/7. 公益建档.mp4"
    };

    const VIDEO_SOURCE_ENTRIES = Object.entries(VIDEO_SOURCES);
    const BOOT_STATUS_ITEMS = [
      "首页影像缓存中",
      "Caching home video layer",
      "底层视频完整下载中",
      "Downloading cinematic base",
      "滚动影像帧序列校准中",
      "Scroll frame sequence aligning",
      "数据库调度中",
      "Database orchestration",
      "侨批索引唤醒中",
      "Memory atlas awakening"
    ];

    function getVideoSourceForPage(page, sourceMap = VIDEO_SOURCES) {
      return sourceMap[page] || sourceMap.home || VIDEO_SOURCES.home;
    }

    function clampProgress(value) {
      return Math.max(0, Math.min(1, Number.isFinite(value) ? value : 0));
    }

    async function cacheVideoInBrowser(key, src, onProgress, signal, priority = "auto") {
      const response = await fetch(src, { cache: "force-cache", signal, priority });
      if (!response.ok) throw new Error(`Video cache warmup failed: ${key}`);

      const totalBytes = Number(response.headers.get("content-length")) || 0;

      if (!response.body || !response.body.getReader) {
        await response.arrayBuffer();
        if (onProgress) onProgress(key, 1);
        return true;
      }

      const reader = response.body.getReader();
      let receivedBytes = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        receivedBytes += value.byteLength;
        if (totalBytes > 0 && onProgress) onProgress(key, receivedBytes / totalBytes);
      }

      if (onProgress) onProgress(key, 1);
      return true;
    }

    function waitForBrowserIdle(signal, timeout = 2200) {
      return new Promise((resolve) => {
        if (signal.aborted) {
          resolve();
          return;
        }

        let taskId;
        const finish = () => resolve();
        const abort = () => {
          if (window.cancelIdleCallback && typeof taskId === "number") {
            window.cancelIdleCallback(taskId);
          } else {
            window.clearTimeout(taskId);
          }
          resolve();
        };

        signal.addEventListener("abort", abort, { once: true });
        if (window.requestIdleCallback) {
          taskId = window.requestIdleCallback(finish, { timeout });
        } else {
          taskId = window.setTimeout(finish, Math.min(timeout, 900));
        }
      });
    }

    function delay(ms, signal) {
      return new Promise((resolve) => {
        if (signal.aborted) {
          resolve();
          return;
        }

        const timer = window.setTimeout(resolve, ms);
        signal.addEventListener("abort", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });
    }

    function useVideoPreloader() {
      const [state, setState] = useState({
        ready: false,
        progress: 0.03,
        sources: VIDEO_SOURCES,
        warmed: {}
      });

      useEffect(() => {
        let cancelled = false;
        const controller = new AbortController();
        const signal = controller.signal;
        let backgroundWarmupStarted = false;
        let retryTimer = 0;

        const setHomeDownloadProgress = (key, progress) => {
          if (cancelled || key !== "home") return;
          const visibleProgress = 0.03 + clampProgress(progress) * 0.97;
          setState((current) => ({
            ...current,
            progress: Math.max(current.progress, visibleProgress)
          }));
        };

        const markWarmed = (key, status) => {
          if (cancelled) return;
          setState((current) => ({
            ...current,
            warmed: { ...current.warmed, [key]: status }
          }));
        };

        const warmRemainingVideos = async () => {
          const remaining = VIDEO_SOURCE_ENTRIES.filter(([key]) => key !== "home");
          await delay(5000, signal);
          for (const [key, src] of remaining) {
            if (cancelled || signal.aborted) return;
            await waitForBrowserIdle(signal, 2600);
            if (cancelled || signal.aborted) return;
            try {
              await cacheVideoInBrowser(key, src, null, signal, "low");
              markWarmed(key, "ready");
            } catch (error) {
              if (!signal.aborted) markWarmed(key, "fallback");
            }
            await delay(520, signal);
          }
        };

        const startBackgroundWarmup = () => {
          if (backgroundWarmupStarted || cancelled || signal.aborted) return;
          backgroundWarmupStarted = true;
          warmRemainingVideos();
        };

        const downloadHomeVideo = async () => {
          try {
            await cacheVideoInBrowser("home", VIDEO_SOURCES.home, setHomeDownloadProgress, signal, "high");
            markWarmed("home", "ready");
            if (cancelled) return;
            setState((current) => ({
              ...current,
              ready: true,
              progress: 1
            }));
            startBackgroundWarmup();
          } catch (error) {
            if (!signal.aborted) {
              markWarmed("home", "retrying");
              retryTimer = window.setTimeout(() => {
                if (!cancelled && !signal.aborted) downloadHomeVideo();
              }, 1600);
            }
          }
        };

        downloadHomeVideo();

        return () => {
          cancelled = true;
          controller.abort();
          window.clearTimeout(retryTimer);
        };
      }, []);

      return state;
    }

          x = (Math.random() - 0.5) * 128;

          z = (Math.random() - 0.5) * 38;
        }

        const seed = new THREE.Vector3(x, y, z);
        points.push({
          seed,
          current: seed.clone(),
          target: seed.clone(),
          size: 1.2 + Math.random() * 2,
          alpha: 0.32 + Math.random() * 0.55,
          phase: Math.random() * Math.PI * 2,
          gold: Math.random() > 0.78 ? 1 : Math.random() * 0.45
        });
      }
      return points;
    }

    function noiseField(position, time) {
      const nx = Math.sin(position.y * 0.055 + time * 0.24) * 0.42;
      const ny = Math.cos(position.x * 0.045 + time * 0.18) * 0.36;
      const nz = Math.sin((position.x + position.y) * 0.025 + time * 0.16) * 0.28;
      return new THREE.Vector3(nx, ny, nz);
    }

    function connectByDistance(points, maxDistance) {
      const pairs = [];
      const maxPairs = points.length * 3.2;
      for (let i = 0; i < points.length; i++) {
        let localLinks = 0;
        for (let j = i + 1; j < points.length; j++) {
          if (localLinks >= 3 || pairs.length >= maxPairs) break;
          const distance = points[i].target.distanceTo(points[j].target);
          if (distance < maxDistance && Math.random() > 0.48) {
            pairs.push([i, j]);
            localLinks++;
          }
        }
      }
      return pairs;
    }

    function applyScrollMorph(points, scrollProgress) {
      const progress = Math.max(0, Math.min(1, scrollProgress));
      points.forEach((point, i) => {
        const t = i / points.length;
        const seed = point.seed;
        const networkAngle = t * Math.PI * 14;
        const routeAngle = t * Math.PI * 3.2;
        const network = new THREE.Vector3(
          Math.cos(networkAngle) * (28 + Math.sin(t * 9) * 18),
          Math.sin(networkAngle) * 22 + (t - 0.5) * 22,
          Math.sin(networkAngle * 0.6) * 24
        );
        const route = new THREE.Vector3(
          (t - 0.5) * 132,
          Math.sin(routeAngle) * 32 + Math.sin(t * 18) * 8,
          Math.cos(routeAngle) * 14
        );
        const stable = new THREE.Vector3(
          Math.cos(networkAngle) * 36 + (t - 0.5) * 14,
          Math.sin(networkAngle) * 20,
          Math.sin(t * Math.PI * 2) * 16
        );

        let target = seed.clone();
        if (progress < 0.25) {
          target.lerp(network, progress / 0.25 * 0.28);
        } else if (progress < 0.55) {
          target = seed.clone().lerp(network, (progress - 0.25) / 0.3);
        } else if (progress < 0.8) {
          target = network.clone().lerp(route, (progress - 0.55) / 0.25);
        } else {
          target = route.clone().lerp(stable, (progress - 0.8) / 0.2);
        }
        point.target.copy(target);
      });
    }

    function GeoArchiveField() {
      const canvasRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !window.THREE) return undefined;

        const isMobile = window.matchMedia("(max-width: 760px)").matches;
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const count = isMobile ? 210 : 410;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = isMobile ? 118 : 92;
        const renderer = new THREE.WebGLRenderer({
          canvas: canvasRef.current,
          antialias: true,
          alpha: true,
          powerPreference: "high-performance"
        });
        renderer.setClearColor(0x000000, 0);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, isMobile ? 1 : 1.25));
        renderer.setSize(window.innerWidth, window.innerHeight);

        const points = createSeedPoints(count);
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        const sizes = new Float32Array(count);
        const alphas = new Float32Array(count);

        const pointGeometry = new THREE.BufferGeometry();
        pointGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        pointGeometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
        pointGeometry.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));
        pointGeometry.setAttribute("aAlpha", new THREE.BufferAttribute(alphas, 1));

        const pointMaterial = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          vertexColors: true,
          uniforms: {
            uPixelRatio: { value: Math.min(window.devicePixelRatio || 1, isMobile ? 1 : 1.5) }
          },
          vertexShader: `
            attribute float aSize;
            attribute float aAlpha;
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
              vColor = color;
              vAlpha = aAlpha;
              vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
              gl_PointSize = aSize * (220.0 / -mvPosition.z);
              gl_Position = projectionMatrix * mvPosition;
            }
          `,
          fragmentShader: `
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
              vec2 c = gl_PointCoord - vec2(0.5);
              float d = length(c);
              float strength = 1.0 - smoothstep(0.18, 0.5, d);
              if (strength <= 0.0) discard;
              gl_FragColor = vec4(vColor, vAlpha * strength);
            }
          `
        });

        const pointCloud = new THREE.Points(pointGeometry, pointMaterial);
        scene.add(pointCloud);

        const lineGeometry = new THREE.BufferGeometry();
        const lineMaterial = new THREE.LineBasicMaterial({
          color: 0xd8b46a,
          transparent: true,
          opacity: 0.16,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lines);

        let scrollProgress = 0;
        let raf = 0;
        let frame = 0;
        let pairs = [];

        let scrollTrigger = null;

        const updateScrollProgress = (progress) => {
          scrollProgress = Math.max(0, Math.min(1, progress));
        };

        const setupScrollProgress = () => {
          if (window.gsap && window.ScrollTrigger) {
            window.gsap.registerPlugin(window.ScrollTrigger);
            scrollTrigger = window.ScrollTrigger.create({
              id: "geo-archive-field-progress",
              trigger: document.documentElement,
              start: 0,
              end: () => window.ScrollTrigger.maxScroll(window),
              invalidateOnRefresh: true,
              onUpdate: (self) => updateScrollProgress(self.progress),
              onRefresh: (self) => updateScrollProgress(self.progress)
            });
            updateScrollProgress(scrollTrigger.progress || 0);
          }
        };

        const handleResize = () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, window.innerWidth < 760 ? 1 : 1.25));
          renderer.setSize(window.innerWidth, window.innerHeight);
        };

        function updateNodeField(time, progress) {
          applyScrollMorph(points, progress);

          for (let i = 0; i < points.length; i++) {
            const point = points[i];
            const drift = reduceMotion ? new THREE.Vector3() : noiseField(point.target, time + point.phase);

            const next = point.target.clone().add(drift);
            point.current.lerp(next, reduceMotion ? 0.18 : 0.055);

            positions[i * 3] = point.current.x;
            positions[i * 3 + 1] = point.current.y;
            positions[i * 3 + 2] = point.current.z;

            const breathing = reduceMotion ? 0 : (Math.sin(time * 0.9 + point.phase) + 1) * 0.035;
            const warm = Math.min(1, point.gold + breathing + progress * 0.18);
            colors[i * 3] = 0.82 + warm * 0.18;
            colors[i * 3 + 1] = 0.78 + warm * 0.12;
            colors[i * 3 + 2] = 0.68 + (1 - warm) * 0.22;
            sizes[i] = (point.size + breathing * 4) * (isMobile ? 0.86 : 1);
            alphas[i] = Math.min(0.95, point.alpha + breathing + progress * 0.12);
          }

          pointGeometry.attributes.position.needsUpdate = true;
          pointGeometry.attributes.color.needsUpdate = true;
          pointGeometry.attributes.aSize.needsUpdate = true;
          pointGeometry.attributes.aAlpha.needsUpdate = true;

          if (frame % (isMobile ? 66 : 48) === 0) {
            pairs = connectByDistance(points, progress > 0.25 && progress < 0.8 ? 18 : 14);
            const linePositions = new Float32Array(pairs.length * 6);
            pairs.forEach(([a, b], index) => {
              const p1 = points[a].current;
              const p2 = points[b].current;
              linePositions[index * 6] = p1.x;
              linePositions[index * 6 + 1] = p1.y;
              linePositions[index * 6 + 2] = p1.z;
              linePositions[index * 6 + 3] = p2.x;
              linePositions[index * 6 + 4] = p2.y;
              linePositions[index * 6 + 5] = p2.z;
            });
            lineGeometry.setAttribute("position", new THREE.BufferAttribute(linePositions, 3));
          } else if (lineGeometry.attributes.position) {
            const linePositions = lineGeometry.attributes.position.array;
            pairs.forEach(([a, b], index) => {
              const p1 = points[a].current;
              const p2 = points[b].current;
              linePositions[index * 6] = p1.x;
              linePositions[index * 6 + 1] = p1.y;
              linePositions[index * 6 + 2] = p1.z;
              linePositions[index * 6 + 3] = p2.x;
              linePositions[index * 6 + 4] = p2.y;
              linePositions[index * 6 + 5] = p2.z;
            });
            lineGeometry.attributes.position.needsUpdate = true;
          }

          lineMaterial.opacity = Math.min(0.24, 0.07 + progress * 0.18);
          pointCloud.rotation.y = time * 0.018 + progress * 0.16;
          pointCloud.rotation.x = Math.sin(time * 0.05) * 0.025;
          lines.rotation.copy(pointCloud.rotation);
          camera.position.x += (Math.sin(time * 0.08) * 1.2 - camera.position.x) * 0.018;
          camera.position.y += (Math.cos(time * 0.06) * 0.8 - camera.position.y) * 0.018;
          camera.position.z += ((isMobile ? 118 : 92) + progress * 14 - camera.position.z) * 0.03;
          camera.lookAt(0, 0, 0);
        }

        let visible = document.visibilityState !== "hidden";

        const animate = () => {
          if (!visible) {
            raf = requestAnimationFrame(animate);
            return;
          }
          const time = performance.now() * 0.001;
          updateNodeField(time, scrollProgress);
          renderer.render(scene, camera);
          frame += 1;
          raf = requestAnimationFrame(animate);
        };

        const handleVisibility = () => {
          visible = document.visibilityState !== "hidden";
        };

        setupScrollProgress();
        window.addEventListener("resize", handleResize);
        document.addEventListener("visibilitychange", handleVisibility);
        animate();

        return () => {
          cancelAnimationFrame(raf);
          if (scrollTrigger) scrollTrigger.kill();
          window.removeEventListener("resize", handleResize);
          document.removeEventListener("visibilitychange", handleVisibility);
          pointGeometry.dispose();
          pointMaterial.dispose();
          lineGeometry.dispose();
          lineMaterial.dispose();
          renderer.dispose();
        };
      }, []);

      return <canvas ref={canvasRef} className="geo-canvas" aria-hidden="true" />;
    }

    function ScrollVideoBackdrop({ src, mode = "scroll" }) {
      const videoRef = useRef(null);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return undefined;

        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const isScrollMode = mode === "scroll";
        let scrollTrigger = null;
        let raf = 0;
        let latestProgress = 0;
        let initialized = false;

        const freezeAtEnd = () => {
          video.pause();
          if (!Number.isFinite(video.duration) || video.duration <= 0) return;
          try {
            video.currentTime = Math.max(0, video.duration - 0.06);
          } catch (error) {}
        };

        const seekToProgress = () => {
          raf = 0;
          if (!Number.isFinite(video.duration) || video.duration <= 0) return;
          const maxTime = Math.max(0, video.duration - 0.08);
          const targetTime = Math.max(0, Math.min(maxTime, latestProgress * maxTime));
          if (Math.abs(video.currentTime - targetTime) > 0.018) {
            try {
              video.currentTime = targetTime;
            } catch (error) {}
          }
        };

        const scheduleSeek = (progress) => {
          latestProgress = Math.max(0, Math.min(1, progress));
          if (!raf) raf = requestAnimationFrame(seekToProgress);
        };

        const setupScrollMode = () => {
          if (initialized) return;
          initialized = true;
          video.pause();
          video.currentTime = 0;

          if (reduceMotion) {
            scheduleSeek(0);
            return;
          }

          if (window.gsap && window.ScrollTrigger) {
            window.gsap.registerPlugin(window.ScrollTrigger);
            scrollTrigger = window.ScrollTrigger.create({
              id: "scroll-video-backdrop",
              trigger: document.documentElement,
              start: 0,
              end: () => window.ScrollTrigger.maxScroll(window),
              invalidateOnRefresh: true,
              onUpdate: (self) => scheduleSeek(self.progress),
              onRefresh: (self) => scheduleSeek(self.progress)
            });
            scheduleSeek(scrollTrigger.progress || 0);
            window.ScrollTrigger.refresh();
          }
        };

        const setupPlayOnceMode = () => {
          if (initialized) return;
          initialized = true;
          video.loop = false;
          video.currentTime = 0;

          if (reduceMotion) {
            video.pause();
            return;
          }

          const playPromise = video.play();
          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => {
              video.setAttribute("data-playback-state", "blocked");
            });
          }
        };

        const setup = isScrollMode ? setupScrollMode : setupPlayOnceMode;

        video.addEventListener("loadedmetadata", setup);
        video.addEventListener("ended", freezeAtEnd);
        video.load();
        if (video.readyState >= 1) setup();

        return () => {
          if (raf) cancelAnimationFrame(raf);
          if (scrollTrigger) scrollTrigger.kill();
          video.pause();
          video.removeEventListener("loadedmetadata", setup);
          video.removeEventListener("ended", freezeAtEnd);
        };
      }, [src, mode]);

      return (
        <div className="scroll-video-backdrop" aria-hidden="true">
          <video
            ref={videoRef}
            autoPlay={mode === "playOnce"}
            loop={false}
            muted
            playsInline
            preload="auto"
            src={src}
            aria-label={mode === "scroll" ? "侨批智档首页滚动背景视频" : "侨批智档页面背景视频"}
          />
        </div>
      );
    }

    function GlassCard({ children, className = "", id, tilt = true }) {
      const cardRef = useRef(null);
      const tiltRef = useRef(null);

      useEffect(() => {
        const card = cardRef.current;
        if (!card || !tilt || !window.gsap) return undefined;

        const canTilt = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (!canTilt || reduceMotion) return undefined;

        const gsap = window.gsap;
        gsap.set(card, {
          transformPerspective: 950,
          transformOrigin: "50% 50%",
          transformStyle: "preserve-3d",
          rotationX: 0,
          rotationY: 0,
          y: 0,
          scale: 1
        });

        const quickFns = [
          gsap.quickTo(card, "rotationX", { duration: 0.42, ease: "power3.out", overwrite: "auto" }),
          gsap.quickTo(card, "rotationY", { duration: 0.42, ease: "power3.out", overwrite: "auto" }),
          gsap.quickTo(card, "y", { duration: 0.42, ease: "power3.out", overwrite: "auto" }),
          gsap.quickTo(card, "scale", { duration: 0.42, ease: "power3.out", overwrite: "auto" }),
          gsap.quickTo(card, "--tilt-x", { duration: 0.32, ease: "power3.out", overwrite: "auto" }),
          gsap.quickTo(card, "--tilt-y", { duration: 0.32, ease: "power3.out", overwrite: "auto" }),
          gsap.quickTo(card, "--tilt-light", { duration: 0.28, ease: "power3.out", overwrite: "auto" })
        ];

        tiltRef.current = {
          rotateX: quickFns[0],
          rotateY: quickFns[1],
          lift: quickFns[2],
          scale: quickFns[3],
          lightX: quickFns[4],
          lightY: quickFns[5],
          light: quickFns[6],
          clampRotate: gsap.utils.clamp(-7, 7)
        };

        return () => {
          quickFns.forEach((fn) => {
            if (fn && fn.tween) fn.tween.kill();
          });
          tiltRef.current = null;
          gsap.set(card, { clearProps: "transform" });
        };
      }, [tilt]);

      const handlePointerMove = (event) => {
        const controls = tiltRef.current;
        const card = cardRef.current;
        if (!controls || !card) return;

        const rect = card.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        const y = (event.clientY - rect.top) / rect.height;
        const rotateY = controls.clampRotate((x - 0.5) * 13);
        const rotateX = controls.clampRotate((0.5 - y) * 11);

        controls.rotateX(rotateX);
        controls.rotateY(rotateY);
        controls.lift(-6);
        controls.scale(1.012);
        controls.lightX(x * 100);
        controls.lightY(y * 100);
        controls.light(1);
      };

      const resetTilt = () => {
        const controls = tiltRef.current;
        if (!controls) return;
        controls.rotateX(0);
        controls.rotateY(0);
        controls.lift(0);
        controls.scale(1);
        controls.lightX(50);
        controls.lightY(50);
        controls.light(0);
      };

      return (
        <div
          ref={cardRef}
          id={id}
          className={`liquid-glass glass-edge card-hover rounded-[1.4rem] ${className}`}
          onPointerMove={handlePointerMove}
          onPointerLeave={resetTilt}
          onPointerCancel={resetTilt}
        >
          <div className="tilt-card-content">
            {children}
          </div>
        </div>
      );
    }

    function RagChatPreview({ demo }) {
      const initialMessages = useMemo(() => ([
        { role: "user", content: demo.question },
        { role: "assistant", content: demo.answer, evidences: demo.evidences, model: "MiMo 2.5" }
      ]), [demo]);
      const [messages, setMessages] = useState(initialMessages);
      const [input, setInput] = useState("");
      const [selectedModel, setSelectedModel] = useState(CHAT_MODEL_OPTIONS[0].id);
      const [pending, setPending] = useState(false);
      const [notice, setNotice] = useState("");
      const threadRef = useRef(null);

      useEffect(() => {
        setMessages(initialMessages);
      }, [initialMessages]);

      useEffect(() => {
        if (!threadRef.current) return;
        threadRef.current.scrollTop = threadRef.current.scrollHeight;
      }, [messages, pending]);

      const submitQuestion = async (event) => {
        event.preventDefault();
        const question = input.trim();
        if (!question || pending) return;

        const nextMessages = [...messages, { role: "user", content: question }];
        setMessages(nextMessages);
        setInput("");
        setPending(true);
        setNotice("");

        try {
          if (["127.0.0.1", "localhost"].includes(window.location.hostname) && window.location.port === "4173") {
            throw new Error("local_static_preview");
          }

          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              selectedModel,
              messages: nextMessages.map(({ role, content }) => ({ role, content }))
            })
          });

          if (!response.ok) throw new Error("chat_api_unavailable");
          const data = await response.json();
          const reply = data.reply || "暂时没有生成回答，请换一种问法再试一次。";
          setMessages((current) => [
            ...current,
            {
              role: "assistant",
              content: reply,
              evidences: demo.evidences,
              model: data.displayModel || "MiMo 2.5"
            }
          ]);
        } catch (error) {
          setNotice("当前本地预览没有可用后端；部署到 Cloudflare 并设置 MIMO_API_KEY 后会自动启用真实 MiMo 2.5 调用。");
          setMessages((current) => [
            ...current,
            {
              role: "assistant",
              content: "我已收到这个问题。在线部署环境接入 MiMo 2.5 后，会基于档案编号、原文片段、审核状态和授权边界生成可追溯回答。当前本地预览先保留这条演示回复。",
              evidences: demo.evidences,
              model: "MiMo 2.5"
            }
          ]);
        } finally {
          setPending(false);
        }
      };

      return (
        <GlassCard className="rag-chat-preview" tilt={false}>
          <div className="rag-chat-preview__plate">
            <div className="rag-chat-preview__top">
              <div className="flex items-center gap-3">
                <div className="liquid-glass grid h-10 w-10 place-items-center rounded-[0.9rem] text-[var(--gold)]">
                  <Icon name="MessageCircle" className="h-5 w-5" />
                </div>
                <div>
                  <p className="font-cnserif text-xl font-bold text-white">智能问答系统</p>
                  <p className="mt-1 text-xs font-medium text-white/52">回答必须带来源、审核状态与授权边界</p>
                </div>
              </div>
              <span className="rag-chat-preview__status">{demo.status}</span>
            </div>

            <div className="rag-chat-preview__thread" ref={threadRef}>
              {messages.map((message, index) => (
                <div key={`${message.role}-${index}`} className={`rag-bubble rag-bubble--${message.role}`}>
                  {message.role === "assistant" && (
                    <span className="rag-bubble__model">
                      {message.model || "MiMo 2.5"} · 证据约束回答
                    </span>
                  )}
                  <p>{message.content}</p>
                  {message.evidences && (
                    <div className="rag-evidence-grid">
                      {message.evidences.map(([label, value]) => (
                        <div key={`${label}-${index}`} className="rag-evidence">
                          <span>{label}</span>
                          <strong>{value}</strong>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
              {pending && (
                <div className="rag-bubble rag-bubble--assistant">
                  <span className="rag-bubble__model">MiMo 2.5 · 正在检索证据链</span>
                  <p>正在生成回答，请稍候...</p>
                </div>
              )}
            </div>

            <form className="rag-chat-preview__input" onSubmit={submitQuestion}>
              <input
                value={input}
                onChange={(event) => setInput(event.target.value)}
                placeholder={demo.input}
                aria-label="输入侨批问答问题"
                disabled={pending}
              />
              <ModelSelector selectedModel={selectedModel} onSelect={setSelectedModel} disabled={pending} />
              <button className="rag-chat-preview__send" type="submit" disabled={pending || !input.trim()} aria-label="发送问题">
                <Icon name="ArrowUpRight" className="h-4 w-4" />
              </button>
            </form>
            {notice && <p className="rag-chat-preview__hint">{notice}</p>}
          </div>
        </GlassCard>
      );
    }

    function AudienceStackCarousel({ cases }) {
      const researcherIndex = cases.findIndex(([title]) => title === "研究者");
      const [active, setActive] = useState(researcherIndex >= 0 ? researcherIndex : 0);
      const [paused, setPaused] = useState(false);

      useEffect(() => {
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduceMotion || paused) return undefined;
        const timer = window.setInterval(() => {
          setActive((current) => (current + 1) % cases.length);
        }, 3300);
        return () => window.clearInterval(timer);
      }, [cases.length, paused]);

      const activeCase = cases[active];
      const getStackStyle = (index) => {
        const offset = (index - active + cases.length) % cases.length;
        const layerStyles = [
          {
            zIndex: 8,
            opacity: 1,
            filter: "blur(0px)",
            transform: "translate3d(0, 0, 74px) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1)"
          },
          {
            zIndex: 7,
            opacity: 0.28,
            filter: "blur(0.8px)",
            transform: "translate3d(42px, -18px, 8px) rotateX(0deg) rotateY(-6deg) rotateZ(1.8deg) scale(0.925)"
          },
          {
            zIndex: 6,
            opacity: 0.14,
            filter: "blur(1.6px)",
            transform: "translate3d(78px, 18px, -44px) rotateX(0deg) rotateY(-10deg) rotateZ(4.5deg) scale(0.845)"
          },
          {
            zIndex: 5,
            opacity: 0.07,
            filter: "blur(2.4px)",
            transform: "translate3d(106px, 52px, -92px) rotateX(0deg) rotateY(-14deg) rotateZ(7deg) scale(0.78)"
          }
        ];
        return layerStyles[offset] || {
          zIndex: 1,
          opacity: 0,
          filter: "blur(4px)",
          transform: "translate3d(-80px, 28px, -160px) rotateX(0deg) rotateY(16deg) rotateZ(-8deg) scale(0.72)"
        };
      };

      return (
        <div className="audience-carousel">
          <motion.div
            initial={{ opacity: 0.82, y: 16, filter: "blur(4px)" }}
            whileInView={{ opacity: 1, y: 0, filter: "blur(0px)" }}
            viewport={{ once: true, amount: 0.22 }}
            transition={{ duration: 0.7, ease: "easeOut" }}
          >
            <GlassCard className="audience-summary" tilt={false}>
              <span className="audience-summary__label">
                <Icon name={activeCase[3]} className="h-4 w-4" />
                当前服务对象
              </span>
              <h3 className="audience-summary__title serif-title">{activeCase[0]}</h3>
              <p className="audience-summary__body">{activeCase[1]}</p>
              <p className="audience-summary__output">
                <span className="text-[var(--gold)]">输出：</span>{activeCase[2]}
              </p>
              <div className="audience-dots" aria-label="服务对象轮播切换">
                {cases.map(([title], index) => (
                  <button
                    key={title}
                    type="button"
                    className={`audience-dot ${index === active ? "is-active" : ""}`}
                    aria-label={`切换到${title}`}
                    onClick={() => setActive(index)}
                  >
                    <span>{title}</span>
                    <span className="audience-dot__index">{String(index + 1).padStart(2, "0")}</span>
                  </button>
                ))}
              </div>
            </GlassCard>
          </motion.div>

          <motion.div
            className="audience-stack"
            onMouseEnter={() => setPaused(true)}
            onMouseLeave={() => setPaused(false)}
            initial={{ opacity: 0.82, y: 18, filter: "blur(4px)" }}
            whileInView={{ opacity: 1, y: 0, filter: "blur(0px)" }}
            viewport={{ once: true, amount: 0.16 }}
            transition={{ duration: 0.8, ease: "easeOut" }}
          >
            {cases.map(([title, need, output, icon], index) => (
              <div
                key={title}
                className={`audience-stack-card ${index === active ? "is-front" : ""}`}
                style={getStackStyle(index)}
                aria-hidden={index === active ? "false" : "true"}
              >
                <GlassCard className="audience-card" tilt={false}>
                  <div className="audience-card__plate">
                    <div className="audience-card__top">
                      <div className="audience-card__icon liquid-glass">
                        <Icon name={icon} className="h-7 w-7" />
                      </div>
                      <span className="audience-card__index">{String(index + 1).padStart(2, "0")}</span>
                    </div>
                    <h3 className="audience-card__title serif-title">{title}</h3>
                    <p className="audience-card__copy">{need}</p>
                    <p className="audience-card__output">
                      <span className="text-[var(--gold)]">输出：</span>{output}
                    </p>
                  </div>
                </GlassCard>
              </div>
            ))}
          </motion.div>
        </div>
      );
    }

        ["侨乡村庄", "盘点文化资源、建设长期公共文化服务。", "资源清单、服务记录、年度公益报告。", "MapPin"]

    function ImpactSection() {

                </button>
                <button

              </div>
            </div>
            <motion.div
              className="mt-14 grid gap-5 md:grid-cols-2 xl:grid-cols-4"
              initial="hidden"
              whileInView="visible"
              viewport={{ once: true, amount: 0.16 }}
              transition={{ staggerChildren: 0.06 }}
            >
              {packs.map(([title, desc, icon]) => (
                <motion.div key={title} variants={revealVariant} transition={{ duration: 0.65, ease: "easeOut" }}>
                  <GlassCard className="h-full p-6">
                    <Icon name={icon} className="h-7 w-7 text-[var(--gold)]" />
                    <h3 className="mt-12 font-cnserif text-2xl font-bold text-white">{title}</h3>
                    <p className="mt-4 text-sm leading-7 text-white/68">{desc}</p>
                  </GlassCard>
                </motion.div>
              ))}
            </motion.div>
            <footer className="mt-16 flex flex-col gap-4 border-t border-white/10 pt-8 text-sm text-white/52 md:flex-row md:items-center md:justify-between">
              <p>侨批智档 · Qiaopi Archive Intelligence</p>
              <p>公益组 / 青年红色筑梦之旅 / 2026</p>
            </footer>
          </div>
        </section>
      );
    }

    function HomePage() {
      return (
        <div className="home-page">
          <HeroSection key="home-hero" />
          <ProblemSection key="home-problem" />
          <OutputsSection key="home-outputs" />
          <CapabilitiesSection key="home-capabilities" />
          <WorkflowSection key="home-workflow" />
          <UseCasesSection key="home-use-cases" />
          <ImpactSection key="home-impact" />
        </div>
      );
    }

    function getPageFromLocation() {
      const rawHash = window.location.hash;
      const hash = rawHash.startsWith("#/") ? rawHash.slice(2) : "";
      return NAV_ITEMS.some((item) => item.page === hash) ? hash : "home";
    }

    function VideoBootScreen({ progress }) {
      const [statusIndex, setStatusIndex] = useState(0);
      const percent = Math.round(clampProgress(progress) * 100);
      const statusText = BOOT_STATUS_ITEMS[statusIndex % BOOT_STATUS_ITEMS.length];

      useEffect(() => {
        const timer = window.setInterval(() => {
          setStatusIndex((current) => current + 1);
        }, 1150);
        return () => window.clearInterval(timer);
      }, []);

      return (
        <div className="video-boot-screen" role="status" aria-live="polite" aria-label="侨批智档正在初始化">
          <div className="video-boot-screen__aura" aria-hidden="true"></div>
          <div className="video-boot-screen__panel liquid-glass-strong">
            <span className="video-boot-screen__kicker">Qiaopi Memory Atlas</span>
            <div className="video-boot-screen__title">侨批智档</div>
            <p className="video-boot-screen__text">
              {statusText}
            </p>
            <div className="video-boot-screen__bar" aria-hidden="true">
              <span style={{ width: `${percent}%` }}></span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState(getPageFromLocation);
      const videoBoot = useVideoPreloader();

      const navigate = (nextPage) => {
        const target = NAV_ITEMS.some((item) => item.page === nextPage) ? nextPage : "home";
        const nextUrl = target === "home"
          ? `${window.location.pathname}${window.location.search}`
          : `${window.location.pathname}${window.location.search}#/${target}`;

        if (target === page && window.location.hash === (target === "home" ? "" : `#/${target}`)) {
          const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          window.scrollTo({ top: 0, behavior: reduceMotion ? "auto" : "smooth" });
          return;
        }

        window.scrollTo({ top: 0, behavior: "auto" });
        setPage(target);
        window.history.pushState({ page: target }, "", nextUrl);
      };

      useEffect(() => {
        const handlePopState = () => setPage(getPageFromLocation());
        const handleHashChange = () => {
          if (window.location.hash.startsWith("#/")) setPage(getPageFromLocation());
        };
        window.addEventListener("popstate", handlePopState);
        window.addEventListener("hashchange", handleHashChange);
        return () => {
          window.removeEventListener("popstate", handlePopState);
          window.removeEventListener("hashchange", handleHashChange);
        };
      }, []);

      useEffect(() => {
        const forceTop = () => window.scrollTo({ top: 0, behavior: "auto" });
        forceTop();
        const topTimer = window.setTimeout(forceTop, 80);
        const settledTopTimer = window.setTimeout(forceTop, 260);

        const firstRefresh = window.setTimeout(() => {
          if (window.ScrollTrigger) window.ScrollTrigger.refresh();
        }, 140);
        const settledRefresh = window.setTimeout(() => {
          if (window.ScrollTrigger) window.ScrollTrigger.refresh();
        }, 520);

        return () => {
          window.clearTimeout(topTimer);
          window.clearTimeout(settledTopTimer);
          window.clearTimeout(firstRefresh);
          window.clearTimeout(settledRefresh);
        };
      }, [page]);

      const pageContent = page === "home"
        ? <HomePage key="page-home" />
        : page === "outputs"
          ? <OutputsPage key="page-outputs" onNavigate={navigate} />
          : <DetailPage key={`page-${page}`} page={page} onNavigate={navigate} />;
      const videoSource = getVideoSourceForPage(page, videoBoot.sources);
      const videoMode = page === "home" ? "scroll" : "playOnce";

      if (!videoBoot.ready) {
        return (
          <VideoBootScreen
            progress={videoBoot.progress}
          />
        );
      }

      return (
        <div className="min-h-screen bg-transparent text-white">
          <ScrollVideoBackdrop key={`video-${page}-${videoSource}`} src={videoSource} mode={videoMode} />
          <div className="global-video-shade" aria-hidden="true"></div>
          <GeoArchiveField />
          <Navbar page={page} onNavigate={navigate} />
          <main
            key={`route-${page}`}
            className="route-switch-frame"
          >
            {pageContent}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
